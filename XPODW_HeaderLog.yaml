# ==============================================================================
# XPOD Header Log WITH WIRELESS!!
# ==============================================================================
# description: This document logs header changes across versions for certain monitors
# author: Percy Smith
# date: May 13, 2026
# ==============================================================================
# STRUCTURE NOTES:
#   Each version entry contains:
#     - date:      when this version was introduced
#     - changelog: what changed from the previous version
#     - SD:        column definitions for SD-logged CSV files (write order preserved)
#     - Cell:      column definitions for cellular-published CSV files (write order preserved)
#
#   Each header has:
#     - unit:        (required) physical or encoded unit of the value
#     - dtype:       (required) C/embedded data type as logged by firmware
#     - format:      (optional) format string, used where encoding is non-obvious
#     - sensor:      (optional) sensor IC that produced the reading
#     - adc:         (optional) ADC used for digitization, if applicable
#     - adc_mode:    (optional) single-ended or differential with channel notation
#     - description: (optional) plain-language notes for analysts and developers
#
#   Naming convention:
#     - Full words preferred over abbreviations (Temperature not T, Pressure not P)
#     - Sensor-prefixed where multiple sensors report the same measurand (MiCS2611_Ozone, MQ131_Ozone)
#     - Casing: PascalCase for compound names, sensor model names preserved as-is
# ==============================================================================
X_Standard:
  XPOD_V3_1_0: 
    date: 2024-07-10
    changelog: Not available on Github, but this version did go out to the field in CDOT work
      This version had PRINT_BINS defined 0 (turned off) which gave us less bins :(
      SD is normal, SD_OPCModification is only used for XPODs with the OPC-R2 (in this case, apend OPC_Modification to SD)
    SD_fileinfo: 
      DefaultFileConfig: ConfigA
      FileName: XPODID_MM_dd
      FileType: .TXT
    SD:
      DateTime:
        unit: timestamp
        dtype: string
        format: "YYYY-MM-ddThh:mm:ss"
        sensor: DS3231
      Voltage_in:
        unit: Volts
        dtype: float
        adc: Arduino MEGA A0
        adc_mode: single-ended
      Fig1:
        unit: ADU
        dtype: uint16_t
        sensor: Figaro TGS footprint 1, sensor (Often TGS 2600)
        adc: ADS1115
        adc_mode: single-ended
      Fig2:
        unit: ADU
        dtype: uint16_t
        sensor: Figaro TGS footprint 2, sensor (Often TGS 2602)
        adc: ADS1115
        adc_mode: single-ended
      Fig3:
        unit: ADU
        dtype: uint16_t
        sensor: Figaro TGS footprint 3, sensor 
        adc: ADS1115
        adc_mode: single-ended
      Fig3_heater:
        unit: ADU
        dtype: uint16_t
        sensor: Figaro TGS footprint 3, heater
        adc: ADS1115
        adc_mode: single-ended
      Fig4:
        unit: ADU
        dtype: uint16_t
        sensor: Figaro TGS footprint 4, sensor
        adc: ADS1115
        adc_mode: single-ended
      Fig4_heater:
        unit: ADU
        dtype: uint16_t
        sensor: Figaro TGS footprint 4, heater
        adc: ADS1115
        adc_mode: single-ended
      PID: 
        unit: ADU
        dtype: uint16_t
        sensor: piD-TECH eVx 
        adc: ADS1115
        adc_mode: single-ended
      MiCS2611_Ozone:
        unit: ADU
        dtype: uint16_t
        sensor: MiCS-2611
        adc: ADS1115
        adc_mode: single-ended
      Alphasense_Worker: 
        unit: ADU
        dtype: float
        sensor: Alphasense CO-B4
        adc: ADS1115
        adc_mode: differential (0-1)
        description: Differential between channels 0 & 1
      Alphasense_Auxiliary: 
        unit: ADU
        dtype: float
        sensor: Alphasense CO-B4
        adc: ADS1115
        adc_mode: differential (2-3)
        description: Differential between channels 2 & 3
      ELT_CO2:
        unit: ppm #ALLEGEDLY
        dtype: uint16_t
        sensor: ELT S300-3V
      Temperature:
        unit: Celsius
        dtype: float
        sensor: BME680
      Pressure:
        unit: Hectopascals (hPa)
        dtype: float
        sensor: BME680
      Relative_Humidity:
        unit: "%RH"
        dtype: float
        sensor: BME680
      QS1_C1: 
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 1, channel 1
      QS1_C2: 
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 1, channel 2
      QS2_C1:
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 2, channel 1
      QS2_C2:
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 2, channel 2
      QS3_C1:
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 3, channel 1
      QS3_C2:
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 3, channel 2
      QS4_C1:
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 4, channel 1
      QS4_C2:
        unit: ADU
        dtype: int16_t
        sensor: Alphasense B4
        adc: MCP342x
        adc_mode: differential 
        description: Quadstat module, Alphasense B4 sensor 4, channel 2
      MET_Speed:
        unit: MPH
        dtype: float
        sensor: Shenzen Anemometer (SparkFun)
        description: Digital count metric over measured time 
      MET_Dir:
        unit: degrees
        dtype: float
        sensor: Shenzen Wind Vane (SparkFun)
        adc: Arduino MEGA A5
        adc_mode: single-ended
      MQ:
        unit: ADU
        dtype: int16_t
        sensor: Shinzen MQ footprint
        adc: ADS1115
        adc_mode: single-ended
        description: Commonly MQ-4 or MQ-131
      PM10_ENV: 
        unit: ug/m^3 #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: Environmental PM1.0 concentration
      PM25_ENV: 
        unit: ug/m^3 #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: Environmental PM2.5 concentration
      PM100_ENV: 
        unit: ug/m^3 #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: Environmental PM10.0 concentration
      PM03um: 
        unit: particles #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: 0.3um particle count
      PM05um: 
        unit: particles #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: 0.5um particle count
      PM10um:
        unit: particles #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: 1.0um particle count
      PM25um: 
        unit: particles #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: 2.5um particle count
      PM50um: 
        unit: particles #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: 5.0um particle count
      PM100um: 
        unit: particles #ALLEGEDLY
        dtype: uint16_t
        sensor: Plantower PMS5003
        description: 10.0um particle count
    SD_OPCModification:
      OPC_SamplePeriod:
        unit: seconds
        dtype: float
        sensor: OPC-R2
        description: Sample period of the OPC-R2 
      OPC_SampleFlowRate:
        unit: mL/s
        dtype: float
        sensor: OPC-R2
        description: Flow rate during sampling of the OPC-R2 
      OPC_PM10:
        unit: ug/m^3
        dtype: float
        sensor: OPC-R2
        description: OPC-R2, PM 1.0 concentration
      OPC_PM25:
        unit: ug/m^3
        dtype: float
        sensor: OPC-R2
        description: OPC-R2, PM 2.5 concentration
      OPC_PM100:
        unit: ug/m^3
        dtype: float
        sensor: OPC-R2
        description: OPC-R2, PM 10.0 concentration
