# ==============================================================================
# 7. ALPHASENSE B4 — ELECTROCHEMICAL
# ==============================================================================
# The Alphasense B4 footprint has been used across the fleet for CO (CO-B4)
# and other electrochemical targets. The header names have evolved through
# four distinct states reflecting progressive firmware corrections.
#
# TAXONOMY (in order of increasing correctness):
#
#   Tier 1 — LEGACY/KNOWN-BAD (Alphasense_C1, Alphasense_C2)
#     Firmware mistake: electrodes were read single-ended or read the wrong ADS
#     address instead of differentially. Data is not usable as differential.
#     Monitors: LPOD V1.0–V6, XPOD V4.0–V4.1.1
#
#   Tier 2 — LEGACY/PARTIALLY CORRECT (Alphasense_Aux, Alphasense_Main)
#     Differential read is correct, but dtype is uint16_t which cannot
#     represent negative values from a differential ADC. Data is partially
#     usable but clipped at zero.
#     Monitors: LPOD V7, OzPOD V1–V2
#
#   Tier 3 — CANONICAL (Alphasense_Worker, Alphasense_Auxiliary)
#     Correct differential read, correct dtype (int16_t), correct channel
#     assignment per Alphasense B4 datasheet, electrode role names.
#     Monitors: LPOD V8, OzPOD V3+, XPOD V4.2+, XPOD V5W+
#
# CHANNEL ASSIGNMENTS (canonical):
#   Worker electrode    → ADS1115 differential (0-1)
#   Auxiliary electrode → ADS1115 differential (2-3)
# ==============================================================================

Alphasense_Worker:
  status: canonical
  unit: ADU
  dtype: int16_t
  sensor: Alphasense B4
  adc: ADS1115
  adc_mode: differential (0-1)
  monitors: [LPOD, OzPOD, XPOD]
  introduced:
    LPOD: V8
    OzPOD: V3
    XPOD: V4.2.0, V5W.1.1
  description: >
    Worker electrode of the Alphasense B4 sensor. Correct differential
    read on channels 0-1 per datasheet. Canonical name fleet-wide.
  legacy_aliases:
    - Alphasense_Main   # Tier 2: correct differential, wrong dtype (uint16_t)
    - Alphasense_C1     # Tier 1: single-ended firmware mistake
    - CO_Main           # XPOD pre-V3.1 only

Alphasense_Auxiliary:
  status: canonical
  unit: ADU
  dtype: int16_t
  sensor: Alphasense B4
  adc: ADS1115
  adc_mode: differential (2-3)
  monitors: [LPOD, OzPOD, XPOD]
  introduced:
    LPOD: V8
    OzPOD: V3
    XPOD: V4.2.0, V5W.1.1
  description: >
    Auxiliary electrode of the Alphasense B4 sensor. Correct differential
    read on channels 2-3 per datasheet. Canonical name fleet-wide.
  legacy_aliases:
    - Alphasense_Aux    # Tier 2: correct differential, wrong dtype (uint16_t)
    - Alphasense_C2     # Tier 1: single-ended firmware mistake
    - CO_Aux            # XPOD pre-V3.1 only

# YPOD CO_ISB — single-ended Alphasense read through ISB board (distinct from above)
CO_ISB:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: Alphasense CO-B4 via ISB board
  adc: ADS1115
  adc_mode: single-ended
  monitors: [YPOD]
  description: >
    Single-ended read of the Alphasense CO-B4 through the Alphasense ISB
    (Individual Sensor Board). This is a distinct signal path from the
    direct differential reads used on XPOD/LPOD/OzPOD and is not
    interchangeable with Alphasense_Worker or Alphasense_Auxiliary.


