# ==============================================================================
# HAQLab Low-Cost Sensing Fleet — Sensor Dictionary
# ==============================================================================
# description: Canonical reference for all header fields used across the fleet.
#              Per-monitor HeaderLog YAMLs define version history and write order.
#              This file defines what each field IS — units, dtype, sensor IC,
#              and known legacy aliases.
# author: Percy Smith
# date: 2026-05-25
# ==============================================================================
#
# HOW TO USE THIS FILE
#   - Each entry is the CANONICAL current name for a field.
#   - legacy_aliases: lists retired names that appear in older firmware versions.
#   - status: one of [canonical, legacy, intermediate]
#       canonical    — correct name, use in all new firmware
#       intermediate — transitional name, still present in some active versions
#       legacy       — known-bad or retired, document only, do not use
#   - monitors: which POD platforms this field appears on (any version)
#   - introduced: firmware version where canonical name first appeared
#
# NOMENCLATURE RULES (applied fleet-wide)
#   - Full words preferred over abbreviations (Temperature not T, Pressure not P)
#   - Sensor-prefixed where multiple sensors report the same measurand
#     (e.g. MiCS2611_Ozone, MQ131_Ozone, ELT_CO2)
#   - PascalCase for compound names; sensor model names preserved as-is
#   - Hardware port assignments are YAML properties only, not embedded in header names
#
# ==============================================================================
# SECTIONS
#   1.  Timestamp & Identity
#   2.  Power
#   3.  BME680 — Temperature, Pressure, Humidity, Gas Resistance
#   4.  BMP180 — Temperature, Pressure (YPOD legacy)
#   5.  SHT25 — Temperature, Humidity (YPOD legacy)
#   6.  Figaro TGS — VOC/Gas (slot-based)
#   7.  Alphasense B4 — Electrochemical (canonical & legacy taxonomy)
#   8.  Alphasense Quadstat Module (MCP342x)
#   9.  ELT S300-3V — CO2
#   10. MiCS-2611 — Ozone
#   11. MQ131 — Ozone
#   12. MQ Footprint — Generic
#   13. piD-TECH eVx — PID VOC
#   14. Plantower PMS5003 — Particulate Matter
#   15. OPC-R2 — Optical Particle Counter
#   16. Meteorological — Wind Speed & Direction
#   17. Derived / Calibrated Outputs (YPOD)
#   18. Crosstalk / Relay Fields
#   19. YPOD Legacy / Infrastructure Fields
# ==============================================================================


# ==============================================================================
# 1. TIMESTAMP & IDENTITY
# ==============================================================================

DateTime:
  status: canonical
  unit: timestamp
  dtype: string
  format: "YYYY-MM-ddThh:mm:ss"
  sensor: DS3231, PCF8523
  monitors: [XPOD, YPOD, LPOD, OzPOD, MiniPOD]
  description: ISO 8601 timestamp from DS3231 or PCF8523 RTC
  legacy_aliases:
    - Date   # YPOD V3.1.2–V3.2.0; split into separate Date and Time fields
    - Time   # YPOD V3.1.2–V3.2.0; split into separate Date and Time fields

# Cellular-decomposed timestamp fields (XPOD only)
# These replace DateTime in the cellular publish string for XPOD
DT_Hours:
  status: canonical
  unit: hours
  dtype: int
  sensor: DS3231
  monitors: [XPOD]
  description: Hour component of DateTime, used in cellular publish only

DT_Minutes:
  status: canonical
  unit: minutes
  dtype: int
  sensor: DS3231
  monitors: [XPOD]
  description: Minute component of DateTime, used in cellular publish only

DT_Seconds:
  status: canonical
  unit: seconds
  dtype: int
  sensor: DS3231
  monitors: [XPOD]
  description: Second component of DateTime, used in cellular publish only
  notes: >
    KNOWN BUG in XPOD V5W.1.1: unit was incorrectly written as "minutes"
    in the YAML. The field is seconds. Corrected in dictionary.


# ==============================================================================
# 2. POWER
# ==============================================================================

Voltage_in:
  status: canonical
  unit: Volts
  dtype: float
  adc: Arduino MEGA A0
  adc_mode: single-ended
  monitors: [XPOD]
  description: Input voltage to the XPOD. Not present on V6M PCB (no V_in channel).
    Added back in XPOD V4.1.1 for V4 PCBs.


# ==============================================================================
# 3. BME680 — TEMPERATURE, PRESSURE, HUMIDITY, GAS RESISTANCE
# ==============================================================================

Temperature:
  status: canonical
  unit: Celsius
  dtype: float
  sensor: BME680
  monitors: [XPOD, YPOD, LPOD, OzPOD]

Pressure:
  status: canonical
  unit: Hectopascals (hPa)
  dtype: float
  sensor: BME680
  monitors: [XPOD, YPOD, LPOD, OzPOD]
  notes: >
    UNIT CONFLICT IN OLDER FILES: LPOD and OzPOD HeaderLogs use "Pascals"
    as the unit string. BME680 natively outputs hPa. Canonical unit is hPa.
    LPOD and OzPOD HeaderLogs should be updated to reflect this.

Relative_Humidity:
  status: canonical
  unit: "%RH"
  dtype: float
  sensor: BME680
  monitors: [XPOD, YPOD, LPOD, OzPOD]

BME680_Gas_Resistance:
  status: canonical
  unit: kiloohms (kOhms)
  dtype: uint32_t
  sensor: BME680
  monitors: [XPOD, LPOD, OzPOD]
  description: >
    Raw gas resistance from BME680 VOC heater element. Interpret relative
    to a baseline only — do not treat as absolute VOC concentration.
  notes: >
    UNIT CONFLICT IN OLDER FILES: LPOD and OzPOD HeaderLogs use "Ohms".
    XPOD V4.2+ uses "kiloohms (kOhms)". Canonical unit is kOhms.
    LPOD and OzPOD HeaderLogs should be updated to reflect this.


# ==============================================================================
# 4. BMP180 — TEMPERATURE, PRESSURE (YPOD LEGACY)
# ==============================================================================

BME180_Temperature:
  status: legacy
  unit: Celsius
  dtype: double
  sensor: BMP180
  monitors: [YPOD]
  description: BMP180 temperature output. Error code -99 on read failure.
    Replaced by BME680 Temperature in later YPOD versions.

BME180_Pressure:
  status: legacy
  unit: millibar
  dtype: double
  sensor: BMP180
  monitors: [YPOD]
  description: BMP180 pressure output. Error code -99 on read failure.
    Replaced by BME680 Pressure in later YPOD versions.


# ==============================================================================
# 5. SHT25 — TEMPERATURE, HUMIDITY (YPOD LEGACY)
# ==============================================================================

SHT25_Temperature:
  status: legacy
  unit: Celsius
  dtype: float
  sensor: SHT25
  monitors: [YPOD]
  description: Temperature computed from SHT25 raw output via conversion equation.

SHT25_Humidity:
  status: legacy
  unit: "%RH"
  dtype: float
  sensor: SHT25
  monitors: [YPOD]
  description: Relative humidity computed from SHT25 raw output via conversion equation.


