  monitors: [MiniPOD, XPOD]
  description: Particle count, 16.0–17.5um bin (unverified unit)

OPC_PM10:
  status: canonical
  unit: ug/m^3
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD, XPOD]
  description: PM1.0 mass concentration from OPC-R2 onboard processor

OPC_PM25:
  status: canonical
  unit: ug/m^3
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD, XPOD]
  description: PM2.5 mass concentration from OPC-R2 onboard processor

OPC_PM100:
  status: canonical
  unit: ug/m^3
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD, XPOD]
  description: PM10.0 mass concentration from OPC-R2 onboard processor

OPC_SamplePeriod:
  status: canonical
  unit: seconds
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD, XPOD]
  description: Sample integration period reported by OPC-R2

OPC_SampleFlowRate:
  status: canonical
  unit: mL/s
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD, XPOD]
  description: Sample flow rate reported by OPC-R2

OPC_Temperature:
  status: canonical
  unit: Celsius
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Temperature processed from OPC-R2 raw signal. MiniPOD only.

OPC_Relative_Humidity:
  status: canonical
  unit: "%RH"
  dtype: float
  sensor: OPC-R2
  monitors: [MiniPOD]
