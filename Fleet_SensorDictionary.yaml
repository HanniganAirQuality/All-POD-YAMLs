OPC_TempSignal:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Raw temperature signal bits from OPC-R2. MiniPOD only.

OPC_RelHumSignal:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Raw relative humidity signal bits from OPC-R2. MiniPOD only.

OPC_MToFBin1:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Mean Time of Flight, bin 1. MiniPOD only.

OPC_MToFBin3:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Mean Time of Flight, bin 3. MiniPOD only.

OPC_MToFBin5:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Mean Time of Flight, bin 5. MiniPOD only.

OPC_MToFBin7:
  status: canonical
  unit: ADU
  dtype: uint16_t
  sensor: OPC-R2
  monitors: [MiniPOD]
  description: Mean Time of Flight, bin 7. MiniPOD only.

OPC_RejectGlitch:
  status: canonical
  unit: count
  dtype: uint16_t
