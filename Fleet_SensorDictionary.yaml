# ==============================================================================
# 16. METEOROLOGICAL — WIND SPEED & DIRECTION
# ==============================================================================

MET_Speed:
  status: canonical
  unit: MPH
  dtype: float
  sensor: Shenzen Anemometer (SparkFun)
  monitors: [XPOD, YPOD]
  description: Wind speed via digital pulse count over measured time interval.

MET_Dir:
  status: canonical
  unit: degrees
  dtype: float
  sensor: Shenzen Wind Vane (SparkFun)
  adc: Arduino MEGA A5
  adc_mode: single-ended
  monitors: [XPOD, YPOD]
  description: Wind direction in degrees from wind vane potentiometer.


# ==============================================================================
# 17. DERIVED / CALIBRATED OUTPUTS (YPOD V3.5+)
# ==============================================================================
# Calibrated outputs are computed on-device from raw sensor signals.
# These fields appear only in SD_Calibrate and Serial_Calibrate configs.
# ==============================================================================

TVOC:
  status: canonical
  unit: ppm
  dtype: float
  monitors: [YPOD]
  description: >
    Total VOC concentration derived from Fig2600 and Fig2602 signals
    via embedded calibration equation. YPOD V3.5+ only.

CO:
  status: canonical
  unit: ppb
  dtype: float
  monitors: [YPOD]
  description: >
    Calibrated CO concentration derived from CO_ISB signal.
    Unit history: logged as ppm in early V3.5 configs, corrected to ppb
    in later versions. ppb is the canonical unit.

CO2:
  status: canonical
  unit: ppm
  dtype: float
  monitors: [YPOD]
  description: >
    Calibrated CO2 concentration derived from ELT_CO2 raw signal.
    Appears only in YPOD SD_Calibrate and Serial_Calibrate configs.
    Distinct from ELT_CO2 (raw). See ELT_CO2 for raw field.


# ==============================================================================
# 18. CROSSTALK / RELAY FIELDS
# ==============================================================================

Starter_Packet:
  status: canonical
  unit: char
  dtype: char
  monitors: [MiniPOD]
  description: >
    Single character 'A' prepended to MiniPOD crosstalk packet as
    start-of-packet validator. Introduced MiniPOD V3.4.1.

Relayed_MiniPOD_Crosstalk:
  status: canonical
  unit: NA
  dtype: string
  format: '["A", OPC_PM10, OPC_PM25, OPC_PM100]'
  monitors: [XPOD]
  description: >
    MiniPOD OPC PM values relayed to XPOD via crosstalk serial link,
    then published through Boron 404x cellular. Validated by leading
    character 'A'. XPOD V5+ only.


# ==============================================================================
# 19. YPOD LEGACY / INFRASTRUCTURE FIELDS
# ==============================================================================

YPODID:
  status: legacy
  unit: string
  dtype: string
  monitors: [YPOD]
  description: Pod identifier logged inline to SD in early YPOD versions.
    Dropped in V3.4.3+.

ADC_EmptyChannel:
  status: legacy
  unit: ADU
  dtype: uint16_t
  monitors: [YPOD]
  description: Unconnected ADC channel logged in YPOD V3.1.2. Ignore.

EmptyChannel_GPS:
  status: legacy
  unit: NA
  dtype: NA
  monitors: [YPOD]
  description: >
    GPS channel placeholder in YPOD V3.1.2. GPS hardware was removed
    as unusable. DO NOT USE.

EAST_LONGITUDE:
  status: legacy
  unit: degrees
  dtype: float
  monitors: [YPOD]
  description: >
    RETIGO data format placeholder logged in YPOD calibrated configs.
    Not a live GPS measurement.

NORTH_LATITUDE:
  status: legacy
  unit: degrees
  dtype: float
  monitors: [YPOD]
  description: >
    RETIGO data format placeholder logged in YPOD calibrated configs.
    Not a live GPS measurement.
