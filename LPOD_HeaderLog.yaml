# ==============================================================================
# LPOD Header Log
# ==============================================================================
# description: This document logs header changes across versions for certain monitors
# author: Percy Smith
# date: May 12, 2026
# ==============================================================================
# Sensor Inventory (LPOD hardware):
#   - DS3231: RTC
#   - x3 Figaro Slots: TGS2600 & TGS2602 primarily
#   - Alphasense B4: Dual-electrode, only tested in B4 footprint (differential ADC)
#   - BME680: Temperature, Pressure, Humidity, Gas Resistance
#   - ADS1115 (x2): 16-bit ADC at 0x48 and 0x49
# ==============================================================================
# STRUCTURE NOTES:
#   Each version entry contains:
#     - date:             when this version was introduced
#     - changelog:        what changed from the previous version
#     - microcontroller:  (LPOD only) went through different versions, although B404x was only ever deployed in field
#     - SD_fileinfo:      SD file naming convention & type (.TXT or .CSV)
#     - SD:               column definitions for SD-logged columns (write order preserved)
#     - Cell:             (wireless only) column definitions for cellular-published columns (write order preserved)
#     - Serial:           (YPOD only) tells us order of Serial-printed dataset
#
#   Each header has:
#     - unit:        (required) physical or encoded unit of the value
#     - dtype:       (required) C/embedded data type as logged by firmware
#     - format:      (optional) format string, used where encoding is non-obvious
#     - sensor:      (optional) sensor IC that produced the reading
#     - adc:         (optional) ADC used for digitization, if applicable
#     - adc_mode:    (optional) single-ended or differential with channel notation
#     - description: (optional) plain-language notes for analysts and developers
#
#   Naming convention:
#     - Full words preferred over abbreviations (Temperature not T, Pressure not P)
#     - Sensor-prefixed where multiple sensors report the same measurand (MiCS2611_Ozone, MQ131_Ozone)
#     - Casing: PascalCase for compound names, sensor model names preserved as-is
# ==============================================================================

LPOD_V1_0_0:
  date: 2024-07
  changelog: First LPOD firmware for PCB testing
  microcontroller: Arduino MKR 1500
  SD_fileinfo:  
    FileName: LPODID_YYYY_MM_dd 
    FileType: .CSV 
  SD:
    DateTime:
      unit: timestamp
      dtype: string
      format: "YYYY-MM-ddThh:mm:ss"
      sensor: DS3231
      description: ISO 8601 timestamp from DS3231 RTC
    Fig1:
      unit: ADU
      dtype: uint16_t
      sensor: Figaro TGS footprint 1, sensor (Often TGS 2600)
      adc: ADS1115
      adc_mode: single-ended
    Fig2:
      unit: ADU
      dtype: uint16_t
      sensor: Figaro TGS footprint 2, sensor (Often TGS 2602)
      adc: ADS1115
      adc_mode: single-ended
    Fig3:
      unit: ADU
      dtype: uint16_t
      sensor: Figaro TGS footprint 3
      adc: ADS1115
      adc_mode: single-ended
    Alphasense_C1: 
      unit: ADU
      dtype: int16_t
      sensor: Alphasense CO-B4
      adc: ADS1115
      adc_mode: single-ended (0)
    Alphasense_C2:
      unit: ADU
      dtype: int16_t
      sensor: Alphasense CO-B4
      adc: ADS1115
      adc_mode: single-ended (2)
    Temperature:
      unit: Celsius
      dtype: float
      sensor: BME680
    Pressure:
      unit: Pascals
      dtype: float
      sensor: BME680
    Relative_Humidity:
      unit: "%RH"
      dtype: float
      sensor: BME680
    BME680_Gas_Resistance:
      unit: Ohms
      dtype: uint32_t
      sensor: BME680
      description: Raw gas resistance from BME680 VOC heater element; interpret
        relative to baseline only, not as absolute VOC concentration

