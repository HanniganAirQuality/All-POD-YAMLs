# ==============================================================================
# OzPOD Header Log
# ==============================================================================
# description: This document logs header changes across versions for certain monitors
# author: Percy Smith
# date: May 12, 2026
# ==============================================================================
# NOMENCLATURE CHANGE AT V4:
#   - V1-V3: Alphasense electrodes named Alphasense_Main and Alphasense_Aux
#   - V4+:   Renamed to Alphasense_Worker and Alphasense_Auxiliary to match datasheet terminology
#            after hardware port assignments were corrected
# ==============================================================================
# Sensor Inventory (OzPOD hardware as of V4):
#   - DS3231: RTC
#   - MiCS-2611: Ozone (single-ended ADC)
#   - MQ131: Ozone (single-ended ADC)
#   - Alphasense B4: Dual-electrode, only tested in B4 footprint (differential ADC)
#   - BME680: Temperature, Pressure, Humidity, Gas Resistance
#   - ADS1115 (x2): 16-bit ADC at 0x48 and 0x49
# ==============================================================================
# STRUCTURE NOTES:
#   Each version entry contains:
#     - date:      when this version was introduced
#     - changelog: what changed from the previous version
#     - SD:        column definitions for SD-logged CSV files (write order preserved)
#     - Cell:      column definitions for cellular-published CSV files (write order preserved)
#
#   Each header has:
#     - unit:        (required) physical or encoded unit of the value
#     - dtype:       (required) C/embedded data type as logged by firmware
#     - format:      (optional) format string, used where encoding is non-obvious
#     - sensor:      (optional) sensor IC that produced the reading
#     - adc:         (optional) ADC used for digitization, if applicable
#     - adc_mode:    (optional) single-ended or differential with channel notation
#     - description: (optional) plain-language notes for analysts and developers
#
#   Naming convention (established V1, applied fleet-wide):
#     - Full words preferred over abbreviations (Temperature not T, Pressure not P)
#     - Sensor-prefixed where multiple sensors report the same measurand (MiCS2611_Ozone, MQ131_Ozone)
#     - Hardware port assignments (D01, D23) are YAML properties only, not in header names
#     - Casing: PascalCase for compound names, sensor model names preserved as-is
# ==============================================================================

OzPOD_V1:
  date: 2025-05-21
  changelog: Initial OzPOD firmware; cite LPOD_Particle_V7 (Percy Smith). References
    LPOD_node.h and LPOD_DataStorage.h (renamed to OzPOD_ from V2 onward).
  SD_fileinfo:  
    FileName: OzPODID_YYYY_MM_dd
    FileType: .CSV
  SD:
    DateTime:
      unit: timestamp
      dtype: string
      format: "YYYY-MM-ddThh:mm:ss"
      sensor: DS3231
      description: ISO 8601 timestamp from DS3231 RTC
    MiCS2611_Ozone:
      unit: ADU
      dtype: uint16_t
      sensor: MiCS-2611
      adc: ADS1115
      adc_mode: single-ended
      description: MiCS-2611 ozone sensor raw output
    MQ131_Ozone:
      unit: ADU
      dtype: uint16_t
      sensor: MQ131
      adc: ADS1115
      adc_mode: single-ended
      description: Winsen MQ131 ozone sensor raw output
    Alphasense_Main:
      unit: ADU
      dtype: uint16_t
      sensor: Alphasense B4
      adc: ADS1115
      adc_mode: differential (2-3)
      description: Alphasense B4 main (firmware read wrong differential pair in V1-V3; corrected to 0-1 and renamed Alphasense_Worker in V4)
    Alphasense_Aux:
      unit: ADU
      dtype: uint16_t
      sensor: Alphasense B4
      adc: ADS1115
      adc_mode: differential (0-1)
      description: Alphasense B4 aux (firmware read wrong differential pair in V1-V3; corrected to 2-3 and renamed Alphasense_Auxiliary in V4)
    Temperature:
      unit: Celsius
      dtype: float
      sensor: BME680
    Pressure:
      unit: Pascals
      dtype: float
      sensor: BME680
    Relative_Humidity:
      unit: "%RH"
      dtype: float
      sensor: BME680
    BME680_Gas_Resistance:
      unit: Ohms
      dtype: uint32_t
      sensor: BME680
      description: Raw gas resistance from BME680 VOC heater element; interpret
        relative to baseline only, not as absolute VOC concentration
  Cell:
    # NOTE: Alphasense_Aux and Alphasense_Main are swapped relative to SD due
    # to a known firmware bug in the snprintf field order. Persists through V3.
    # Pressure and BME680_Gas_Resistance are absent from cellular publish.
    MiCS2611_Ozone:
      unit: ADU
      dtype: uint16_t
    MQ131_Ozone:
      unit: ADU
      dtype: uint16_t
    Alphasense_Aux:
      unit: ADU
      dtype: uint16_t
    Alphasense_Main:
      unit: ADU
      dtype: uint16_t
    Temperature:
      unit: Celsius
      dtype: float
    Relative_Humidity:
      unit: "%RH"
      dtype: float

